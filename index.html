<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filsation - City Design & Photography</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <p class="brand">Filsation</p>
            <p class="subtitle">City Design & Photograph</p>
        </div>
        <nav class="tabs-menu">
            <button class="tab-btn active" onclick="cambiarPestaña('home')">HOME</button>
            <button class="tab-btn" onclick="cambiarPestaña('maps')">MAPS</button>
            <button class="tab-btn" onclick="cambiarPestaña('photos')">PHOTOS</button>
            <button class="tab-btn" onclick="cambiarPestaña('blog')">BLOG</button>
        </nav>
    </header>

    <main>
        <section id="home" class="tab-content active">
            <div class="dashboard-container">
                <div id="mapa-contenedor">
                    <div id="map"></div>
                </div>
                <div class="info-contenedor">
                    <h1 id="panel-titulo">PROVINCIA HABANA</h1>
                    <div id="panel-cuerpo">
                        <p class="loading">Cargando datos de la provincia...</p>
                    </div>
                    <div class="footer-link">WORK WITH ME</div>
                </div>
            </div>
        </section>

        <section id="maps" class="tab-content">
       <div id="pantalla-mapas" class="seccion-mapas">
        
        <div class="visor-mapa">
            <img id="foto-mapa-grande" src="" alt="Visor de Mapa">
            <h3 id="titulo-mapa-grande">Selecciona un mapa</h3>
        </div>

        <div class="lista-mapas">
            <h3>Selecciona un Mapa</h3>
            <div id="contenedor-botones-mapas"></div>
        </div>

    </div>
        </section>

        <section id="photos" class="tab-content">
            <div id="contenedor-galeria" class="grid-pinterest"></div>
        </section>

        <section id="blog" class="tab-content">
            <div id="blog" class="tab-content">
    <div class="blog-split-container">
        
        <div class="blog-articulo-completo" id="articulo-completo-zona">
            <p class="cargando-texto">Cargando artículo más reciente...</p>
        </div>

        <div class="blog-lista-lateral">
            <h3>Architecture You'll Love</h3>
            <div class="blog-lista-contenedor" id="lista-articulos-zona">
                </div>
        </div>

    </div>
</div>
        </section>
    </main>

    <div id="lightbox-zoom" class="lightbox">
        <span id="lightbox-cerrar" class="cerrar-btn">&times;</span>
        
        <div class="lightbox-contenido">
            <div class="lightbox-col-izquierda">
                <img id="lightbox-img" src="" alt="Zoom Fotografía">
            </div>
            
            <div class="lightbox-col-derecha">
                <h2 id="lightbox-titulo">Título de la Obra</h2>
                <span id="lightbox-municipio" class="badge">Municipio</span>
                <p id="lightbox-descripcion">Cargando detalles técnicos de la captura arquitectónica...</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
